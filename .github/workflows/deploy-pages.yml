name: Deploy to GitHub Pages

# Deploy only after the Tests workflow completes successfully on main.
# workflow_run is the correct cross-workflow dependency mechanism in
# GitHub Actions (needs: only works within the same workflow file).
# workflow_dispatch allows manual re-deploys.
on:
  workflow_run:
    workflows: ['Tests']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # Skip if triggered by a failed Tests run (not workflow_dispatch).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run: check out the same SHA the Tests workflow used.
          # workflow_dispatch: github.sha is already the right ref.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: v3/package-lock.json

      - name: Install dependencies
        working-directory: v3
        run: npm ci

      - name: Build
        working-directory: v3
        env:
          CI: true
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: v3/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
